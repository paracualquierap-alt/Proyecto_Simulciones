<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Calculador de Combinaciones</title>
    <link rel="stylesheet" href="css/estiloscomb.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>

<body>

    <div class="contenedor">

        <div class="navegacion-retorno">

            <a href="index.html" class="btn-volver">

                <svg xmlns="http://www.w3.org/2000/svg"
                     width="16"
                     height="16"
                     fill="currentColor"
                     viewBox="0 0 16 16">

                    <path fill-rule="evenodd"
                    d="M15 8a.5.5 0 0 0-.5-.5H2.707l3.147-3.146a.5.5 0 1 0-.708-.708l-4 4a.5.5 0 0 0 0 .708l4 4a.5.5 0 0 0 .708-.708L2.707 8.5H14.5A.5.5 0 0 0 15 8"/>
                </svg>

                Volver al Inicio
            </a>

        </div>

        <h1>Calculador de Combinaciones</h1>

        <div class="formula">
            <strong>Fórmula:</strong>
            <span>C(n, r) = n! / (r! × (n - r)!)</span>
        </div>

        <!-- FORMULARIO -->
        <form id="form-combinaciones"
              onsubmit="event.preventDefault(); calcularCombinaciones();">

            <fieldset class="grupo">

                <legend>Grupo 1</legend>

                <div class="input-block">
                    <label for="n1">n₁ (Total elementos)</label>
                    <input type="number" id="n1" value="59" min="0" required>
                </div>

                <div class="input-block">
                    <label for="r1">r₁ (Posiciones a elegir)</label>
                    <input type="number" id="r1" value="5" min="0" required>
                </div>

            </fieldset>

            <fieldset class="grupo">

                <legend>Grupo 2</legend>

                <div class="input-block">
                    <label for="n2">n₂ (Total elementos)</label>
                    <input type="number" id="n2" value="35" min="0" required>
                </div>

                <div class="input-block">
                    <label for="r2">r₂ (Posiciones a elegir)</label>
                    <input type="number" id="r2" value="1" min="0" required>
                </div>

            </fieldset>

            <button type="submit">
                Calcular Combinaciones
            </button>

        </form>

        <div class="resultado" id="resultado">
            El total de combinaciones aparecerá aquí
        </div>

    </div>

    <script src="js/scriptcomb.js"></script>

</body>
</html>
