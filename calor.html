<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Simulador de Transferencia de Calor</title>
    <link rel="stylesheet" href="css/estilosc.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>

<body>

    <div class="contenedor">

        <div class="navegacion-retorno">
            <a href="index.html" class="btn-volver">

                <svg xmlns="http://www.w3.org/2000/svg"
                    width="16"
                    height="16"
                    fill="currentColor"
                    viewBox="0 0 16 16">

                    <path fill-rule="evenodd"
                    d="M15 8a.5.5 0 0 0-.5-.5H2.707l3.147-3.146a.5.5 0 1 0-.708-.708l-4 4a.5.5 0 0 0 0 .708l4 4a.5.5 0 0 0 .708-.708L2.707 8.5H14.5A.5.5 0 0 0 15 8"/>
                </svg>

                Volver al Inicio
            </a>
        </div>

        <h1>Simulador de Transferencia de Calor</h1>

        <div class="formula">
            <strong>Ley de Enfriamiento de Newton:</strong>
            <span>T = Ts + (T₀ - Ts)e^(-kt)</span>
        </div>

        <!-- FORMULARIO -->
        <form id="formulario" onsubmit="event.preventDefault(); calcularTemperatura();">

            <div class="seccion-form seccion-termica">

                <h3>Condiciones Térmicas</h3>

                <div class="input-grupo">
                    <label for="T0">Temperatura Inicial (T₀) °F</label>
                    <input type="number" id="T0" value="120" required>
                </div>

                <div class="input-grupo">
                    <label for="Ts">Temperatura Entorno (Ts) °F</label>
                    <input type="number" id="Ts" value="38" required>
                </div>

            </div>

            <div class="seccion-form seccion-control">

                <h3>Parámetros de Control</h3>

                <div class="input-grupo">
                    <label for="k">Constante (k)</label>
                    <input type="number" id="k" step="0.01" value="0.45" required>
                </div>

                <div class="input-grupo">
                    <label for="t">Tiempo (t) en horas</label>
                    <input type="number" id="t" min="0" step="0.1" value="3" required>
                </div>

            </div>

            <button type="submit">
                Calcular Temperatura Final
            </button>

        </form>

        <div class="resultado" id="resultado">
            El gradiente térmico calculado aparecerá aquí...
        </div>

    </div>

    <script src="css/scriptc.js"></script>

</body>
</html>
